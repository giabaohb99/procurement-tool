services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    volumes:
      - ./backend:/app          # mount code -> hot reload, không cần build lại
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    environment:
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - ./frontend:/app         # mount code -> HMR
      - /app/node_modules       # giữ node_modules trong container
    ports:
      - "8080:5173"
    depends_on:
      - api

volumes:
  db_data:
